// ── Sparkles ───────────────────────────────────────────────────────────────
function burstSparkles(x, y) {
  const emojis = ['✨','⭐','💖','🌟','💫'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (Math.PI * 2 * i) / 8;
    const dx = Math.cos(angle) * 60;
    const dy = Math.sin(angle) * 60;
    s.style.left = (x + dx) + 'px';
    s.style.top = (y + dy) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}

// ── Storage ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'star-academy-v2';
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

    text:`Luna was no ordinary girl. By day she went to school and painted pictures of dragons. By night she hunted shadows.

  { id:'starfall', title:'The Missing Microphone', icon:'🎤', grad:'linear-gradient(135deg,#f43f5e,#ec4899)',
    text:`Sora was the lead singer of a five-member group called Starfall. Their biggest concert was tomorrow night, and something dreadful had happened. Her favourite microphone was gone.

  { id:'tower', title:'The Wobbling Tower', icon:'🏗️', grad:'linear-gradient(135deg,#10b981,#06b6d4)',
    text:`Mia had one ambition for the school craft fair: to build the tallest cardboard tower in the history of Maple Street Primary. She had spent three evenings cutting, folding, and stacking cardboard tubes.
By Friday morning, the tower stood at one metre and twelve centimetres. It was impressive. It was also, unfortunately, wobbling.

  { id:'giggle', title:'The Giggle Room', icon:'🎪', grad:'linear-gradient(135deg,#6366f1,#7c3aed)',
    text:`Pepper had explored most of Dandy's World, but she had never opened the door marked GIGGLE ROOM. Today she pushed it open.

    text:`Coral the seahorse had drifted far from her family. A strong current had pulled her away from the reef while she was chasing a tiny shrimp. Now she was somewhere cold and dark.

  { id:'pancake', title:'Pancake Panic', icon:'🥞', grad:'linear-gradient(135deg,#f59e0b,#ef4444)',
    text:`It was Saturday morning, and Ella had decided she would make pancakes all by herself. Her grandma was still upstairs.
Ella measured the flour carefully into a bowl. She cracked in two eggs (only one shell fell in, which she fished out with a spoon). She poured in the milk and stirred until the lumps disappeared.

  { id:'robot', title:'The Robot Who Wanted to Dance', icon:'🤖', grad:'linear-gradient(135deg,#8b5cf6,#ec4899)',
    text:`Bolt was a kitchen robot. His job was to stir soup, chop carrots, and wipe down the counters. He was excellent at all three.
But every evening, when the kitchen was quiet, Bolt watched the family's television through the doorway. He saw people on a dance show, twirling and leaping, and something inside his circuits hummed.

    text:`In the small kingdom of Thistledown, there lived a dragon called Periwinkle. He was not like other dragons. He did not steal gold. He did not eat knights. He said please and thank you.

    text:`Astra had been invited to her first party on the Moon. Her cousin Vega lived in one of the space stations, and she had organised a bouncing party in the low-gravity hall.
Astra packed carefully: her silver helmet, her special bouncy boots, a present wrapped in stars, and a small bag of space marshmallows.
When she arrived, the hall was full of children floating three metres into the air with every small jump. Music played from speakers on the ceiling. A banner said HAPPY 8TH, VEGA!
Astra took a breath, ran, and jumped. She flew higher than she expected and accidentally somersaulted twice before landing, giggling, on a soft blue cushion.
"You are a natural!" said Vega, who was eating marshmallows upside down.
They bounced for two whole hours. They played a game where you had to catch a floating balloon while spinning. Astra won twice.
On the way home in the shuttle, Astra fell asleep holding her empty marshmallow bag.`,

  { id:'library', title:'The Whispering Library', icon:'📚', grad:'linear-gradient(135deg,#10b981,#6366f1)',
    text:`The library on Primrose Lane had a secret. Every book there could whisper its own story to you, but only if you were very quiet.
Hassan discovered this by accident on a rainy Wednesday. He had gone in to escape the rain, and he was sitting in a beanbag with a book about pirates on his lap.
"Turn the page, lad," said a tiny voice.
Hassan looked around. Nobody. He looked at the book. The book looked back.
"Go on," it whispered. "The next bit is my favourite."
Hassan turned the page. The book chuckled softly and began to tell him about a pirate who was scared of crabs.
Hassan read for an hour without noticing the time. When he stood up to leave, the book said "Come back tomorrow, there is a much better chapter."
He did. He came back every Wednesday for the rest of the term. He always chose a different book. Each one whispered. Each one was kind.
He never told anyone. Some secrets are too nice to share.`,

  { id:'bakery', title:'The Midnight Bakery', icon:'🥐', grad:'linear-gradient(135deg,#f59e0b,#ec4899)',
    text:`Mr Fielding ran the only bakery in Hilltop. Every night, at exactly midnight, he began his baking. By five in the morning, fresh loaves were cooling on the racks.
But Mr Fielding was not alone in the bakery. He had two helpers: a very small, very serious mouse called Crumb, who did the weighing, and a chubby moth called Dust, who checked the oven temperatures by fluttering near the glass.
They were not official employees. Mr Fielding had never paid them. In return, they took one crust each at the end of every shift.
One night, the oven broke. Mr Fielding stared at it helplessly. Crumb climbed into the dial, wiggled something, and climbed out. Dust fluttered at the ignition. The oven roared back to life.
"Thank you," said Mr Fielding.
Crumb nodded. Dust landed briefly on his glasses. They carried on working until five. Nobody in Hilltop ever found out who really ran the bakery.`,

  { id:'ava-star', title:"Ava and the Star Machine", icon:'⭐', grad:'linear-gradient(135deg,#ec4899,#8b5cf6)',
    text:`Ava was seven years old, and she had just built the most important thing of her life: a Star Machine.
It was made of a cereal box, three empty toilet rolls, two hair clips, and an awful lot of silver glitter glue. It did not do anything, technically. But Ava was certain, absolutely certain, that it could catch stars.
She put the machine on her windowsill that night, switched off her light, and waited.
At 3am, she woke up. The machine was glowing. Inside, spinning gently, was a tiny silver star the size of a pea.
Ava did not scream. She picked it up carefully. It was warm.
"I caught you," she whispered.
The star blinked. It blinked three times, then flew back out of the window into the sky, leaving a little trail of glitter that spelled out one word: THANKS.
Ava went back to sleep with the biggest smile of her life.
In the morning, she told her mum. Her mum pretended not to believe her, but kept the glitter trail in a jar on the shelf.`,

  { id:'ava-roblox', title:"Ava's Roblox Adventure", icon:'🎮', grad:'linear-gradient(135deg,#10b981,#06b6d4)',
    text:`Ava loved playing Roblox. Her favourite game was Adopt Me, where she had collected seventeen pets.
One Saturday, something strange happened. When she logged in, her pet unicorn Sprinkle started talking to her.
"Ava," said Sprinkle, "I am bored of running in circles. Can we go on a real adventure?"
Ava blinked at the screen. "But you're a pixel."
"Not today," said Sprinkle. "Today I am on a mission. Today we are going to find the secret island."
Ava pressed every button. Her character climbed a strange glowing ladder that had never been there before. They swam across a sparkling sea. They found an island with twelve coconut trees, a rainbow waterfall, and a small shop selling enchanted pizza.
Ava bought three slices with her saved Robux. They were the best slices ever (pixelated, but somehow crunchy).
When Ava's mum called her for dinner, Sprinkle winked. "See you tomorrow, partner."
Ava closed her laptop. On the screen, just for a second, she saw a tiny reflection of a rainbow waterfall.`,

  { id:'phoenix', title:'The Phoenix Feather', icon:'🔥', grad:'linear-gradient(135deg,#ef4444,#eab308)',
    text:`Kai had heard about phoenixes in a book. They were birds that burst into flames, burned to ash, and were reborn. He thought they were entirely made up, until he found a feather.
It was glowing. Red and orange and gold all swirled together. Kai picked it up very carefully, using his school jumper as a glove.
The feather pulsed warmly. Kai ran home.
When he showed his grandma, she did not look surprised. She simply nodded, put down her knitting, and said, "So. You have been chosen."
"Chosen for what?" said Kai.
"To look after it. The phoenix trusts you. Keep it safe, warm, and away from the cat."
Kai nodded seriously.
That night, Kai put the feather in a box lined with soft wool. He put the box on his shelf, next to his lion money-box and a picture of his dog.
In the morning, the feather was still glowing. But beside it, in the box, was a single tiny, brand new egg.
Kai looked at the egg. The egg looked at Kai. They had a lot to learn about each other.`,

      {q:"What did Kai use to pick up the feather?",opts:['His hand','His school jumper','Tongs','A book'],ans:1,why:'His school jumper! 🧥'},
      {q:'What did grandma say?',opts:['Throw it away','You have been chosen','Take it to a museum','Hide it'],ans:1,why:'You have been chosen! 👵'},
      {q:'What had to be kept away?',opts:['The dog','The cat','The rain','The fire'],ans:1,why:'The cat! 🐈'},
      {q:'What appeared in the box overnight?',opts:['A second feather','A new egg','A pile of ash','Another bird'],ans:1,why:'A brand new egg! 🥚'},
    ]},
  { id:'secret-door', title:'The Door That Was Not There Yesterday', icon:'🚪', grad:'linear-gradient(135deg,#8b5cf6,#3b82f6)',
    text:`Zoe walked the same way to school every morning. Past the post box, across the zebra crossing, past the library, and down Cedar Lane. Forty-eight steps down Cedar Lane. She counted, every day, because she liked counting.
On Wednesday, there were forty-nine steps.
She stopped.
Between Number 12 and Number 14, where the day before there had been a brick wall, there was now a small wooden door painted sky blue. It had a brass handle and a tiny window.
Zoe looked around. Nobody else seemed to notice.
She checked her watch. She had four minutes before school.
She tried the handle. The door opened. Behind it was not a house, but a small library. Every book on every shelf had her name on the spine.
Zoe ZOE zoe Zoe — in every colour, every font, every size.
A very small librarian peered over her glasses. "Ah," she said. "We've been waiting. Would you like to borrow your own story?"
Zoe took one book, bookmarked the page, and promised to return.
She was exactly one minute late for school. She told her teacher she had been reading. It was completely true.`,

  { id:'mystery-box', title:'The Mystery Box', icon:'📦', grad:'linear-gradient(135deg,#f59e0b,#ef4444)',
    text:`A parcel arrived for Noah on Tuesday morning. It was a small brown box with no return address and his name written in careful black ink.
Noah had not ordered anything. His mum raised an eyebrow. "Open it carefully," she said.
Inside the box was a note. The note said: "You'll know when you need it. Keep it safe."
Inside the box, underneath the note, was a small silver whistle.
Noah put it in his pocket and mostly forgot about it. For two weeks, nothing happened.
Then, on a rainy Saturday, Noah's little sister Ivy wandered out of the garden and got lost on the hill behind their house. Noah ran to find her. He searched for twenty minutes. His voice was getting tired. His heart was thumping.
He remembered the whistle.
He blew it hard. It made a clear silver sound that seemed to travel further than a whistle should.
Two seconds later, from behind a bush further up the hill, Ivy popped up. "I heard that!" she called. "I was playing hide and seek!"
Noah's mum hugged them both very tight. Noah put the whistle back in his pocket. He has kept it ever since.`,

      {q:'What was on the note?',opts:['Good luck','You\'ll know when you need it','Happy birthday','Keep smiling'],ans:1,why:"You'll know when you need it! 💌"},

    ]},
  { id:'moonlight', title:'Moonlight and the Fox', icon:'🦊', grad:'linear-gradient(135deg,#6366f1,#f59e0b)',
    text:`Amelia had a rabbit called Moonlight. Moonlight was white and fluffy and lived in a big hutch at the bottom of the garden.
Every night, a fox walked through the garden. Amelia's dad had watched it from the window. The fox stopped at the hutch, sat down, looked at Moonlight for a while, and then walked off.
"Why doesn't it eat her?" Amelia whispered one night.
"I think they're friends," said her dad.
One night, Amelia was brave. She put on her slippers and crept outside. The fox was there. The fox turned.
For a moment, the girl and the fox looked at each other. The fox did not run. Moonlight nibbled calmly on a carrot, as if this was completely normal.
Amelia sat on the grass, very still, for ten whole minutes. The fox sat too. Then it yawned, stood up, and trotted off through the hedge.
Amelia went back to bed with cold feet and a warm heart. She never told anyone at school. She thought they would not believe her.
She was probably right.`,

  { id:'sky-painter', title:'The Sky Painter', icon:'🎨', grad:'linear-gradient(135deg,#ec4899,#f59e0b)',
    text:`Every sunrise, someone painted the sky. Nobody knew who.
One cold Friday, Elliot woke up at 5am because he had a terrible itch on his knee. He looked out of his window, half asleep, and saw a tall figure standing on his next-door neighbour's roof, holding an enormous paintbrush.
The figure dipped the brush into a pot of pink paint. Then into a pot of orange. Then into a pot of soft gold. With huge sweeping strokes, they painted the sky above the town.
Elliot rubbed his eyes. The figure waved.
Elliot waved back.
When the sun fully rose, the figure was gone. The roof was empty. The sky was the normal sky.
Elliot never told anyone. But every Friday morning, at 5am, he pretended to have an itchy knee and looked out of his window, just in case.
Sometimes, very rarely, just for a second, he thought he saw a paintbrush.`,

  { id:'balloon', title:'The Runaway Balloon', icon:'🎈', grad:'linear-gradient(135deg,#ef4444,#f59e0b)',
    text:`At the village fete, Jasmine was given a bright red balloon on a silver string. She tied it carefully to her wrist, because her mum had said, very firmly, not to let go.
Then a small gust of wind came. The balloon wriggled. Jasmine loosened her wrist for just one second to scratch her nose, and the balloon slipped free.
Up it went. Over the coconut shy. Over the face-painting tent. Over the church spire. Jasmine watched it shrink into a tiny red dot and then vanish.
She did not cry, though her chin wobbled. She marched back to her mum and announced, "My balloon has gone on an adventure."
Her mum, who was wiser than most people gave her credit for, said, "Then we should wave." And they waved at the sky, for a whole minute, in case the balloon could somehow see.
Two weeks later, a letter arrived. It had been sent by a farmer in a village thirty miles away. The balloon had landed in his field, still tied to a card with Jasmine's name on it. He had posted the card back with a photograph of the balloon next to a very curious sheep.
Jasmine kept the photo on her fridge for years.`,

  { id:'snowday', title:'The Perfect Snow Day', icon:'☃️', grad:'linear-gradient(135deg,#06b6d4,#8b5cf6)',
    text:`When Zara woke up on Thursday morning, the world was white. Snow had fallen all night. It was on the roofs, on the cars, on the top of every postbox, and, most importantly, on the school.
"No school today," said her dad, reading his phone with a small private smile.
Zara put on two pairs of socks, her warmest coat, her hat, her scarf, her gloves, and, after some debate, another hat on top. She looked like a small round barrel with eyes.
Outside, she built a snowman with her neighbour Reggie. They argued about whether the snowman should have eyebrows. Reggie won.
They had a snowball fight. Zara won that one, mostly because Reggie kept laughing too hard to aim.
They drank hot chocolate with tiny marshmallows. They watched a film. Zara fell asleep on the sofa holding a biscuit.
When she woke up, the snow was already melting. She felt a little sad, but also full of chocolate and happiness, which is an excellent feeling.`,

  { id:'wizardhat', title:'The Wizard Who Lost His Hat', icon:'🎩', grad:'linear-gradient(135deg,#8b5cf6,#ec4899)',
    text:`Wizard Humphrey had been a wizard for forty-seven years, and in that time he had never lost his hat. Not once. And now, on the day of the Grand Spell-Off, his hat was nowhere to be found.
He searched his tower. He searched his garden. He searched inside his own pockets, twice, which his wife Maud gently pointed out was a bit silly.
"A wizard's hat holds half his magic," Humphrey muttered, pacing. "I cannot possibly compete without it."
Maud looked up from her book. "Then I shall find it," she said, and she stood up, walked calmly into the kitchen, and came back holding the hat.
"Where was it?" Humphrey gasped.
"On top of the biscuit tin," said Maud. "You took it off to reach the gingerbread."
Humphrey remembered. He kissed Maud on the forehead, put on his hat, and raced off to the Spell-Off. He won second place, which was disappointing, but honestly, he had forgotten to practise.
Maud made him gingerbread anyway.`,

  { id:'newshoes', title:'The New Shoes', icon:'👟', grad:'linear-gradient(135deg,#ec4899,#f43f5e)',
    text:`Priya had been saving up for pink trainers with stars on the side for six whole months. On Saturday, finally, she took her money tin to the shop. Forty-two pounds and eighty pence. It was enough.
The shoes were everything she had hoped. They even had a tiny strip of glitter along the heel.
She wore them home. She wore them to the park. She wore them to the shop to buy milk. By Sunday evening, she had walked eleven miles in them.
On Monday morning, she discovered a small hole in the left heel, right through the glitter strip.
Priya took them back to the shop. The man behind the counter looked puzzled. "These are designed for gentle wear," he said.
Priya did not know what gentle wear meant. She thought shoes were for walking.
The man, who was actually very kind, exchanged them for a tougher pair. They were not pink, but they had stars. Priya decided that was acceptable. She walked home carefully, counting every step.`,

  { id:'greenhouse', title:'The Singing Tomatoes', icon:'🍅', grad:'linear-gradient(135deg,#10b981,#ef4444)',
    text:`Grandad Bertie grew tomatoes in a small wooden greenhouse at the end of his garden. He claimed, very seriously, that they grew better if he sang to them.
Mira's mum rolled her eyes. Mira's cousin laughed. But Mira, who was seven and open-minded, believed him at once.
Every afternoon that summer, Mira went into the greenhouse with Grandad. They sang to the tomatoes. Mostly they sang old songs Grandad remembered from his grandmother, but sometimes Mira sang the theme tunes to her favourite shows, which Grandad pretended to know.
The tomatoes grew enormously. One was the size of a grapefruit. One had a bit that looked like a nose. One was exactly the shape of a small heart.
At the village show, Grandad won first prize. Second prize. And third.
On the way home, Mira asked him if the singing had actually helped.
Grandad thought for a moment. "I think it helped us," he said.
She decided that was the same thing.`,

  { id:'detective', title:'The Case of the Missing Biscuits', icon:'🔍', grad:'linear-gradient(135deg,#6366f1,#3b82f6)',
    text:`Detective Marley had been called to investigate a very serious crime. Someone had eaten every biscuit in the tin. Every single one.
He assembled the suspects in the kitchen: his little sister Polly (aged 4), the cat (aged 9), and a large goldfish called Norman.
Marley immediately ruled out Norman, on account of Norman living in a bowl.
Polly denied everything. "I did not eat biscuits," she said, through a mouth absolutely coated in chocolate chip crumbs.
The cat purred and looked extremely innocent, which Marley knew was suspicious.
Marley took his magnifying glass and examined the scene. He found: crumb trails under the kitchen table, one small handprint on the lid of the tin, and zero paw prints.
He presented his findings to his mum.
His mum looked at Polly. Polly looked at the floor. The cat yawned and walked away, having committed no crimes whatsoever.
Polly had to wash up the tin as a punishment. Marley shared his own secret biscuit (kept in his sock drawer) with her. That is what brothers are for.`,

  { id:'treehouse', title:'The Secret Treehouse', icon:'🌳', grad:'linear-gradient(135deg,#10b981,#84cc16)',
    text:`At the bottom of Kit's garden stood an old oak tree, and in the oak tree stood a treehouse, and in the treehouse, according to her brother Toby, lived a family of tiny explorers.
Kit did not believe him. She was nine, and too old for such things. But she climbed up anyway, just to check.
The treehouse was dusty and smelled of leaves. On a tiny shelf nailed to the wall was a notebook the size of her thumb.
Kit opened it. Inside, written in very neat writing, was:
"Monday: found a brilliant acorn.
Tuesday: rained.
Wednesday: met a friendly squirrel.
Thursday: Kit climbed up. She looks kind."
Kit stared at it for a long time. Then she wrote very carefully, in very neat writing of her own:
"Thursday: I AM kind. Thank you."
She went back down the ladder, feeling strange and quietly delighted.
She never asked Toby about it. Some things are better kept.`,
    qs:[
      {q:'How old was Kit?',opts:['Seven','Eight','Nine','Ten'],ans:2,why:'She was nine! 👧'},

  { id:'violin', title:'Mei and the Violin', icon:'🎻', grad:'linear-gradient(135deg,#ec4899,#8b5cf6)',
    text:`Mei had wanted a violin for three birthdays in a row. On her eighth, she finally got one. It was small and shiny and came with a bow and a little block of yellow stuff called rosin.
She imagined she would be playing beautiful music by teatime.
By teatime, the noise coming from her bedroom was, according to her dad, "like two cats in a shopping trolley."
Mei did not give up. Her teacher, Miss Okoye, showed her how to hold the bow (not like a sword), how to rest the violin (not on her lap), and how to tune the strings (very carefully).
Mei practised for twenty minutes every day. By month three, she could play Twinkle Twinkle Little Star. Her cat still ran away, but only because of habit.
By month eight, Mei played a recital at school. It was not perfect. She missed one note completely and played another one twice. But her mum cried the good kind of tears, and Mei knew she would never stop playing.`,

      {q:"What did Mei's dad compare the noise to?",opts:['A car horn','Two cats in a shopping trolley','A broken radio','Pigeons'],ans:1,why:'Two cats in a shopping trolley! 😹'},

  { id:'hedgehog', title:'Hector the Hedgehog', icon:'🦔', grad:'linear-gradient(135deg,#f59e0b,#84cc16)',
    text:`Hector the hedgehog lived under a pile of leaves at the bottom of number 14. He had a very organised life. At eight he woke up, at nine he went hunting for slugs, at eleven he drank from the saucer that a kind lady put out for him, and by half past five in the morning, he was safely back under his leaves.
One Tuesday, the pile of leaves was gone. The kind lady's husband had tidied the garden.
Hector panicked. He scurried in circles. He went the wrong way twice. Then he sat down, took a slow breath (hedgehogs breathe quickly, so his slow breath was still quite fast), and thought.
Under the shed, he remembered, was another pile. He trundled off. It was drier and had an excellent roof.
That night, he slept beautifully. The next evening, he made sure to leave some slug trails near the shed door, so that when the kind lady found the saucer untouched, she would follow the trails and know he was fine.
She did. She moved the saucer. Hector gave her a small huff of approval.`,

      {q:'Where did Hector sleep?',opts:['Under leaves at number 14','In a burrow','In a tree','Under a bench'],ans:0,why:'Under a pile of leaves at number 14! 🍂'},
      {q:'What happened on Tuesday?',opts:['The saucer vanished','The leaves were tidied away','It rained','A fox came'],ans:1,why:'The garden was tidied! 🧹'},

  { id:'beach', title:'The Sandcastle Competition', icon:'🏖️', grad:'linear-gradient(135deg,#06b6d4,#f59e0b)',
    text:`Every August, at Whitsands Bay, there was a sandcastle competition. The prize was a trophy shaped like a bucket, and, more excitingly, an enormous ice cream.
This year, Tomasz had a plan. He had been watching videos. He had brought a special tool for carving windows, and a protractor for measuring towers.
His sister Anya had brought a plastic spade and some shells.
Tomasz built a castle with seven towers, a drawbridge, and a tiny moat that went all the way round. It took him two hours. It was very impressive.
Anya built a lumpy dome, stuck shells on in a spiral pattern, and called it The Shell Palace. It took her twenty minutes.
The judge walked around, thoughtfully, for ages. She stopped in front of Anya's.
"The creativity," she said. "The joy. The shells."
Anya won. Tomasz was disappointed for exactly fifteen seconds, and then he cheered her very loudly. They shared the ice cream. It was mint choc chip.`,

  { id:'rocket', title:'The Homework Rocket', icon:'🚀', grad:'linear-gradient(135deg,#6366f1,#ec4899)',
    text:`Leo had forgotten his homework. It was Wednesday morning, and he had been supposed to bring in a model of a rocket. He had, with great confidence, told Mrs Patel on Friday that his would be "incredible."
It was now 7:42 am. School started at 8:45.
Leo grabbed a kitchen roll tube, some silver foil, three plastic straws, a red crayon, and a lot of tape.
By 8:10 he had made a rocket. It had a silver body, three fins that were wonky but fins nonetheless, and a slightly melted-looking nose cone made from foil scrunched over the crayon.
At school, Mrs Patel asked the class to hold up their rockets. Most were neat and tidy. Some were a bit too neat and tidy. Leo's was clearly made in a hurry.
Mrs Patel, however, smiled.
"This one looks like the builders actually enjoyed themselves," she said. "Leo, tell us what you learnt."
"I learnt," said Leo, honestly, "not to leave things until Wednesday."
Mrs Patel gave him a gold star anyway.`,

      {q:'What did Leo learn?',opts:['To use glue','Not to leave things until Wednesday','To use better paper','To ask for help'],ans:1,why:'Not to leave things until Wednesday! 📅'},
    ]},
  { id:'busstop', title:'The Bus Stop Friend', icon:'🚌', grad:'linear-gradient(135deg,#8b5cf6,#3b82f6)',
    text:`Every weekday, at the number 27 bus stop, Mrs Elsie sat with her shopping bag, her walking stick and her small brown hat. She had been sitting there, at the same time, for forty years.
One morning, a small girl named Hope sat next to her by accident. Hope was waiting for her mum, who was late.
"Nice morning," said Mrs Elsie.
"My mum is late," said Hope.
"Mums usually are," said Mrs Elsie. "Have a mint."
She handed Hope a very small paper-wrapped mint, which Hope put in her pocket because she was not allowed sweets from strangers, even nice ones.
When Hope's mum arrived, she apologised twelve times. Mrs Elsie waved them off.
The next day, Hope brought Mrs Elsie a picture she had drawn of the number 27 bus. The day after that, she brought her a biscuit. The day after that, a tiny posy of daisies.
By the end of the week, Mrs Elsie had three drawings, four biscuits and a very happy face.
They remained friends for a long time afterwards.`,

  { id:'football', title:'The Penalty Kick', icon:'⚽', grad:'linear-gradient(135deg,#10b981,#f59e0b)',
    text:`It was the school cup final. The score was one-one. Ninety seconds of extra time remained, and Sami's team had just been awarded a penalty.
Mr Collins, the coach, pointed at Sami. Sami went pale. He had never taken a penalty in a match before, not a real one.
He placed the ball on the spot. His legs felt like spaghetti.
The goalkeeper, a tall boy called Ravi, jumped up and down and pretended to be a cat, which was meant to be distracting. It only made Sami laugh, which calmed him down completely.
Sami breathed out slowly, just like his dad had taught him, and struck the ball firmly and low into the bottom corner. Ravi dived the wrong way. The ball hit the net.
The whole playground erupted. Sami's teammates lifted him up. Mr Collins was shouting something nobody could hear. Ravi, to his credit, clapped.
Two-one. Cup won. Sami could not stop smiling for three days.`,

  { id:'forces', title:'Pushes & Pulls', icon:'⚡', grad:'linear-gradient(135deg,#3b82f6,#8b5cf6)',
    teach:`A **force** is a push or a pull.
When you **push** something it moves away from you.
When you **pull** something it moves towards you.
**Gravity** is a pulling force from the Earth. It pulls everything down. That is why things fall.
**Friction** is a force that slows things down when they rub together. A ball rolling on grass stops because of friction.
**Magnets** can pull some metals (like iron) towards them. They can also push other magnets away.`,
    qs:[
      {q:'What is a force?',opts:['A colour','A push or pull','A smell','A sound'],ans:1,why:'A push or pull! 💪'},
      {q:'What pulls things DOWN?',opts:['Friction','Gravity','Magnets','Air'],ans:1,why:'Gravity pulls everything down! ⬇️'},
      {q:'What slows a ball on grass?',opts:['Gravity','Friction','Magnets','Wind'],ans:1,why:'Friction slows it! 🌱'},
      {q:'Magnets attract…?',opts:['Wood','Plastic','Iron','Glass'],ans:2,why:'Magnets attract iron! 🧲'},
      {q:'Pushing means moving something…?',opts:['Towards you','Away from you','In circles','Up only'],ans:1,why:'Away from you! 👉'},
    ]},
  { id:'weather', title:'Weather & Seasons', icon:'🌦️', grad:'linear-gradient(135deg,#06b6d4,#3b82f6)',
    teach:`The UK has four **seasons**: **Spring, Summer, Autumn and Winter**.
**Spring** is when plants grow and baby animals are born.
**Summer** is the warmest season with the longest days.
**Autumn** is when leaves turn orange and fall from trees.
**Winter** is the coldest season, sometimes with snow.
**Weather** is what the sky and air are doing right now: sunny, rainy, windy, snowy, cloudy.
**Clouds** are made of tiny water droplets. When clouds get heavy, water falls as **rain**.`,
    qs:[
      {q:'How many seasons are there?',opts:['Two','Three','Four','Five'],ans:2,why:'Four seasons! 🍂'},
      {q:'Which season has the longest days?',opts:['Spring','Summer','Autumn','Winter'],ans:1,why:'Summer! ☀️'},
      {q:'When do leaves fall from trees?',opts:['Spring','Summer','Autumn','Winter'],ans:2,why:'Autumn! 🍁'},
      {q:'Clouds are made of…?',opts:['Smoke','Water droplets','Dust','Cotton'],ans:1,why:'Tiny water droplets! ☁️'},
      {q:'The coldest season is…?',opts:['Spring','Summer','Autumn','Winter'],ans:3,why:'Winter! ❄️'},
    ]},
  { id:'states', title:'States of Matter', icon:'💧', grad:'linear-gradient(135deg,#06b6d4,#8b5cf6)',
    teach:`Everything in the world is a **solid**, a **liquid** or a **gas**. These are called the **states of matter**.
**Solids** keep their shape. Examples: wood, ice, a book, a chair.
**Liquids** flow and take the shape of their container. Examples: water, milk, juice.
**Gases** spread out to fill any space. Examples: air, steam.
Water is special because it can be all three! **Ice** is solid water, **water** is liquid, and **steam** is gas water.
When a solid heats up, it can **melt** into a liquid. When a liquid heats up, it can **evaporate** into a gas. When a gas cools, it **condenses** back into liquid. When a liquid cools, it **freezes** into a solid.`,
    qs:[
      {q:'What are the 3 states of matter?',opts:['Hot, warm, cold','Solid, liquid, gas','Big, medium, small','Up, down, across'],ans:1,why:'Solid, liquid, gas! 🧊💧💨'},
      {q:'Which keeps its shape?',opts:['Solid','Liquid','Gas','None'],ans:0,why:'Solids keep their shape! 📦'},
      {q:'Ice turning to water is called…?',opts:['Freezing','Melting','Boiling','Cooling'],ans:1,why:'Melting! 🌡️'},
      {q:'Water becoming ice is called…?',opts:['Melting','Evaporating','Freezing','Boiling'],ans:2,why:'Freezing! ❄️'},
      {q:'Steam is…?',opts:['Solid','Liquid','Gas','Ice'],ans:2,why:'Steam is a gas! 💨'},
    ]},
  { id:'food-chain', title:'Food Chains', icon:'🌿', grad:'linear-gradient(135deg,#84cc16,#10b981)',
    teach:`A **food chain** shows how living things get their energy by eating other living things.
It always starts with a **plant**. Plants are called **producers** because they make their own food using sunlight.
**Animals that eat plants** are called **herbivores** (like rabbits, cows, sheep).
**Animals that eat other animals** are called **carnivores** (like foxes, tigers, hawks).
**Animals that eat both** are called **omnivores** (like bears, pigs, humans).
Example food chain:
**Grass → Rabbit → Fox**
The grass is the producer. The rabbit eats the grass. The fox eats the rabbit.`,
    qs:[
      {q:'What starts every food chain?',opts:['A fox','A plant','The sun','An animal'],ans:1,why:'A plant (producer)! 🌱'},
      {q:'Animals that only eat plants are…?',opts:['Carnivores','Herbivores','Omnivores','Producers'],ans:1,why:'Herbivores! 🐰'},
      {q:'Animals that eat other animals?',opts:['Herbivores','Producers','Carnivores','Plants'],ans:2,why:'Carnivores! 🦊'},
      {q:'Humans are…?',opts:['Carnivores','Herbivores','Omnivores','Producers'],ans:2,why:'We eat both! 🍔'},
      {q:'In Grass → Rabbit → Fox, what eats the rabbit?',opts:['The grass','The fox','The sun','Nothing'],ans:1,why:'The fox! 🦊'},
    ]},
  { id:'electricity', title:'Electricity', icon:'⚡', grad:'linear-gradient(135deg,#eab308,#f59e0b)',
    teach:`**Electricity** is a type of energy. It powers lights, TVs, computers, fridges and much more.
Electricity travels through wires in a **circuit**. A circuit is a loop that electricity can flow around.
A **battery** stores electricity. A **switch** can turn electricity on or off.
Some things are made of materials that electricity can travel through, called **conductors** (like metal).
Other materials stop electricity, called **insulators** (like plastic, rubber and wood). That is why plug wires are covered in plastic, to keep us safe!
**Safety rule:** Never touch plug sockets or wires, and never use electrical things near water.`,
    qs:[
      {q:'What is a circuit?',opts:['A switch','A loop electricity flows around','A battery','A light'],ans:1,why:'A loop electricity flows around! 🔁'},
      {q:'What stores electricity?',opts:['A wire','A battery','A switch','A bulb'],ans:1,why:'A battery! 🔋'},
      {q:'Which is a conductor?',opts:['Plastic','Metal','Wood','Rubber'],ans:1,why:'Metal conducts electricity! 🔩'},
      {q:'Which is an insulator?',opts:['Metal','Water','Plastic','Copper'],ans:2,why:'Plastic is an insulator! 🔌'},
      {q:'Where should you NEVER use electrical things?',opts:['In the garden','Near water','In the kitchen','In the living room'],ans:1,why:'Never near water! 💧'},
    ]},
  { id:'light', title:'Light & Shadows', icon:'💡', grad:'linear-gradient(135deg,#fbbf24,#f59e0b)',
    teach:`**Light** is a type of energy we need to see. Without light, everything is dark.
**Light sources** make their own light. The **Sun**, a **lamp**, a **torch** and a **candle** are all light sources.
The **Moon** does not make light. It reflects light from the Sun.
**Shadows** are made when an object blocks the light. A shadow is the dark shape made behind the object.
Shadows change depending on where the light comes from. In the morning and evening, shadows are **long**. At midday, when the Sun is high, shadows are **short**.
Some materials let light through (**transparent**, like glass). Some let a little through (**translucent**, like frosted glass). Some block all light (**opaque**, like wood).`,
    qs:[
      {q:'Which is a light source?',opts:['The Moon','A mirror','The Sun','A shadow'],ans:2,why:'The Sun makes its own light! ☀️'},
      {q:'What makes a shadow?',opts:['Water','Light blocked by an object','The wind','Colours'],ans:1,why:'An object blocking light! 👤'},
      {q:'When are shadows shortest?',opts:['Morning','Midday','Evening','Night'],ans:1,why:'At midday when sun is high! 🌞'},
      {q:'Glass is…?',opts:['Transparent','Opaque','Dark','Shiny'],ans:0,why:'Light passes through glass! 🪟'},
      {q:'Wood is…?',opts:['Transparent','Translucent','Opaque','Clear'],ans:2,why:'Wood blocks light (opaque)! 🪵'},
    ]},
  { id:'sound', title:'Sound', icon:'🔊', grad:'linear-gradient(135deg,#8b5cf6,#ec4899)',
    teach:`**Sound** is made when something **vibrates** (wiggles back and forth very fast).
When you pluck a guitar string, it vibrates and makes a sound. When you talk, your **vocal cords** vibrate.
Sound travels in **waves** through the air. It can also travel through water and solids!
**Loud** sounds have big waves. **Quiet** sounds have small waves.
**High** sounds (like a whistle) have fast vibrations. **Low** sounds (like a drum) have slow vibrations.
We hear with our **ears**. The ear has a special thin skin called the **eardrum** that vibrates when sound hits it.
**Too loud** can hurt your ears! Protect your hearing.`,
    qs:[
      {q:'What makes sound?',opts:['Colour','Vibrations','Light','Heat'],ans:1,why:'Things vibrating! 🎸'},
      {q:'How does sound travel?',opts:['In circles','In waves','In lines','In dots'],ans:1,why:'In waves! 〰️'},
      {q:'What vibrates in your ear?',opts:['The earlobe','The eardrum','The jaw','The brain'],ans:1,why:'The eardrum! 👂'},
      {q:'A whistle makes a…?',opts:['High sound','Low sound','Quiet sound','No sound'],ans:0,why:'High sound! 📯'},
      {q:'Sound can travel through…?',opts:['Only air','Only water','Only solids','Air, water and solids'],ans:3,why:'Air, water AND solids! 💨💧🧱'},
    ]},
  { id:'rocks', title:'Rocks & Soils', icon:'🪨', grad:'linear-gradient(135deg,#78716c,#f59e0b)',
    teach:`**Rocks** are natural solid materials that make up the Earth.
There are three types:
1. **Igneous rocks** form when hot, melted rock (magma) cools and hardens. Example: **granite**.
2. **Sedimentary rocks** form when layers of sand, mud and shells press together over millions of years. Example: **sandstone** and **limestone**.
3. **Metamorphic rocks** are changed by heat and pressure. Example: **marble** and **slate**.
**Fossils** are the shapes of plants or animals found in rocks. They show us what lived on Earth long ago.
**Soil** is made of tiny bits of rock mixed with dead plants. Different soils are good for different plants.`,
    qs:[
      {q:'Rocks from cooled magma are…?',opts:['Sedimentary','Igneous','Metamorphic','Fossil'],ans:1,why:'Igneous! 🌋'},
      {q:'Sandstone is…?',opts:['Igneous','Sedimentary','Metamorphic','A fossil'],ans:1,why:'Sedimentary, made in layers! 🏜️'},
      {q:'Fossils are…?',opts:['Living animals','Shapes of old plants or animals in rocks','Types of rock','Magic stones'],ans:1,why:'Shapes of old living things! 🦖'},
      {q:'What is soil made of?',opts:['Only water','Bits of rock and dead plants','Only sand','Only leaves'],ans:1,why:'Bits of rock and dead plants! 🌱'},
      {q:'Marble is a…?',opts:['Igneous rock','Sedimentary rock','Metamorphic rock','Fossil'],ans:2,why:'Metamorphic, changed by heat and pressure! 🗿'},
    ]},
  { id:'lifecycle', title:'Life Cycles', icon:'🐛', grad:'linear-gradient(135deg,#10b981,#f59e0b)',
    teach:`All living things grow and change. The stages they go through are called a **life cycle**.
**Butterfly life cycle:**
1. **Egg** - a tiny egg on a leaf
2. **Caterpillar** - hatches and eats lots
3. **Chrysalis** (pupa) - hard case where it changes
4. **Butterfly** - the adult flies away!
**Frog life cycle:**
1. **Eggs** (frogspawn) in the pond
2. **Tadpole** with a tail
3. **Froglet** with legs and a tail
4. **Frog** - adult
**Plants** also have life cycles: seed → sprout → young plant → flowering plant → new seeds.`,
    qs:[
      {q:'What does a caterpillar become?',opts:['A bird','A butterfly','A beetle','A spider'],ans:1,why:'A butterfly! 🦋'},
      {q:'What is a baby frog with a tail called?',opts:['Frogspawn','Tadpole','Froglet','Jelly'],ans:1,why:'A tadpole! 🐸'},
      {q:'What comes before the butterfly stage?',opts:['Egg','Caterpillar','Chrysalis','Larva'],ans:2,why:'The chrysalis! 🛡️'},
      {q:'What do plants grow from?',opts:['Eggs','Seeds','Roots','Leaves'],ans:1,why:'Seeds! 🌱'},
      {q:'Frogspawn is…?',opts:['Baby frogs','Frog eggs','Dead frogs','Frog food'],ans:1,why:'Frog eggs in the pond! 🥚'},
    ]},
  { id:'habitats', title:'Habitats', icon:'🌳', grad:'linear-gradient(135deg,#10b981,#06b6d4)',
    teach:`A **habitat** is a place where a plant or animal lives. It gives them food, water and shelter.
Different habitats have different plants and animals:
**Rainforest** - hot and wet. Home to monkeys, parrots, jaguars.
**Desert** - hot and dry. Home to camels, snakes, cacti.
**Ocean** - salty water. Home to fish, whales, dolphins, octopuses.
**Polar** - very cold with ice. Home to polar bears, penguins, seals.
**Woodland** - trees and plants. Home to foxes, owls, squirrels.
**Pond** - freshwater. Home to frogs, fish, dragonflies.
Every animal is **adapted** to its habitat. A polar bear has thick fur. A camel has a hump for storing fat.`,
    qs:[
      {q:'Where does a polar bear live?',opts:['Rainforest','Polar habitat','Desert','Ocean'],ans:1,why:'Polar habitat (cold and icy)! 🧊'},
      {q:'Camels live in the…?',opts:['Ocean','Rainforest','Desert','Pond'],ans:2,why:'Desert! 🐪'},
      {q:'A habitat gives an animal…?',opts:['Only food','Only water','Food, water and shelter','Nothing'],ans:2,why:'All three! 🏠'},
      {q:"What is on a camel's back?",opts:['Wings','Hump for storing fat','Fur','Spikes'],ans:1,why:'A hump! 🏜️'},
      {q:'Jaguars live in the…?',opts:['Desert','Rainforest','Arctic','Pond'],ans:1,why:'Rainforest! 🌴'},
    ]},
  { id:'body', title:'Human Body', icon:'🫀', grad:'linear-gradient(135deg,#ef4444,#ec4899)',
    teach:`Your body has many parts, each doing an important job.
Your **heart** pumps blood around your body.
Your **lungs** help you breathe in air.
Your **brain** thinks and controls everything.
Your **stomach** digests the food you eat.
Your **bones** give your body its shape. You have 206 bones when you are grown up.
Your **skin** keeps everything inside and protects you.
Your **teeth** chew your food. You should brush them twice a day!`,
    qs:[
      {q:'What pumps blood?',opts:['Lungs','Heart','Brain','Stomach'],ans:1,why:'The heart pumps blood! ❤️'},
      {q:'What helps you breathe?',opts:['Heart','Stomach','Lungs','Brain'],ans:2,why:'Lungs! 🫁'},
      {q:'What do teeth do?',opts:['Breathe','Chew food','Think','Pump blood'],ans:1,why:'Chew food! 🦷'},
      {q:'How many bones do grown-ups have?',opts:['106','206','306','1000'],ans:1,why:'206 bones! 🦴'},
      {q:'Which part thinks?',opts:['Brain','Heart','Skin','Stomach'],ans:0,why:'The brain! 🧠'},

  { id:'fire', title:'The Great Fire of London', icon:'🔥', grad:'linear-gradient(135deg,#ef4444,#f59e0b)',
    teach:`In **1666**, a terrible fire started in London.
It began in a **bakery** on Pudding Lane, owned by Thomas Farriner. A spark from the oven set fire to the wooden building.
The fire spread very quickly because most houses were made of **wood** and built very close together. There was also a strong wind.
The fire burned for **four days**. It destroyed about 13,200 houses and 87 churches, including St Paul's Cathedral.
**Samuel Pepys** wrote about the fire in his diary. He buried his cheese and wine to keep them safe!
After the fire, London was rebuilt with **brick** and **stone** instead of wood. A new St Paul's Cathedral was built by **Sir Christopher Wren**.`,

  { id:'egypt', title:'Ancient Egypt', icon:'🏛️', grad:'linear-gradient(135deg,#f59e0b,#eab308)',
    teach:`The Ancient Egyptians lived over **3000 years ago** along the River **Nile** in Africa.
They built huge **pyramids** as tombs for their kings, called **pharaohs**. The most famous pyramid is the Great Pyramid at Giza.
When a pharaoh died, they were turned into a **mummy**. Special oils and cloth were used to preserve their body.
Egyptians wrote using pictures called **hieroglyphs**.

  { id:'nightingale', title:'Florence Nightingale', icon:'🕯️', grad:'linear-gradient(135deg,#ec4899,#f43f5e)',
    teach:`**Florence Nightingale** was born in 1820. She is famous for being a **nurse** who changed medicine forever.
When she was young, her family wanted her to get married, but she wanted to help sick people.
During the **Crimean War** (1854), she took 38 nurses to help wounded soldiers. The hospitals were dirty and many soldiers were dying from infections.
Florence made the hospitals clean. She made sure soldiers had fresh water, clean beds, and good food. Many more soldiers got better.
She walked around at night carrying a **lamp** to check on patients. The soldiers called her **"The Lady with the Lamp"**.
After the war, she opened a nursing school and made nursing a respected job.`,

  { id:'elizabeth', title:'Queen Elizabeth II', icon:'👑', grad:'linear-gradient(135deg,#8b5cf6,#6366f1)',
    teach:`**Queen Elizabeth II** was born in 1926 in London.

She had four children: Charles, Anne, Andrew and Edward. Her eldest son **Charles** became king after her.
She loved **horses** and **corgis** (small dogs). She always carried a handbag.
She met lots of important people, including many prime ministers and presidents, and watched Britain change enormously during her reign.`,

  { id:'vikings', title:'The Vikings', icon:'⚔️', grad:'linear-gradient(135deg,#3b82f6,#78716c)',
    teach:`The **Vikings** came from **Scandinavia** (the lands we now call Norway, Sweden and Denmark).

At first they came to **raid** (steal treasure). Later, many stayed to live and farm.
Vikings were brave warriors. They wore helmets (but NOT with horns - that is a myth!), carried shields and fought with axes and swords.
They believed in many gods like **Odin** and **Thor**.
Famous Viking king: **King Canute**, who became King of England.
The Vikings gave us lots of everyday words like 'egg', 'sky', 'window' and 'husband'.`,

  { id:'tudors', title:'The Tudors', icon:'👑', grad:'linear-gradient(135deg,#dc2626,#f59e0b)',
    teach:`The **Tudor** family were Kings and Queens of England about **500 years ago**.
The most famous Tudor was **King Henry VIII**. He had **six wives**! He was big, loud, loved hunting, feasts and playing music.
The rhyme to remember what happened to his wives: **"divorced, beheaded, died, divorced, beheaded, survived"**.
His daughter, **Queen Elizabeth I**, ruled for 45 years. She never married and was called the "Virgin Queen". She loved music, theatre and fancy dresses.
In Tudor times:
- **William Shakespeare** wrote plays (Romeo and Juliet, Macbeth)
- Explorers sailed to new lands
- Tudor houses had wooden beams and small windows
- Rich people wore fancy ruffs around their necks`,

// COMPONENTS

function Stars({ count }) {
  return (
    <div style={{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',marginTop:6}}>
      {Array.from({length:Math.min(count,10)}).map((_,i) => (
        <span key={i} style={{fontSize:'1.2rem',animation:`star-spin ${2+i*0.3}s linear infinite`}}>⭐</span>
      ))}
    </div>
  );
}

function Header({ gems, onHome, title }) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',gap:10}}>
      <button className="btn-ghost" onClick={onHome} style={{fontSize:'0.85rem'}}>🏠 Home</button>
      {title && <div style={{fontWeight:800,flex:1,textAlign:'center',fontSize:'1rem'}}>{title}</div>}
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'rgba(255,255,255,0.08)',borderRadius:50,fontSize:'0.88rem'}}>
        💎 {gems}
      </div>
    </div>
  );
}

function ProgressBar({ value }) {
  return (
    <div className="progress-bar"><div className="progress-fill" style={{width:`${value*100}%`}}/></div>
  );
}

// ── Welcome ────────────────────────────────────────────────────────────────
function Welcome({ gems, onStart }) {
  return (
    <div className="slide-in" style={{textAlign:'center',padding:'40px 20px',maxWidth:480,margin:'0 auto'}}>
      <div className="float" style={{fontSize:'5rem',marginBottom:16}}>🌟</div>
      <h1 style={{fontSize:'2.4rem',fontWeight:900,background:'linear-gradient(135deg,#ec4899,#a855f7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:8}}>
        Star Academy
      </h1>
      <p style={{color:'rgba(255,255,255,0.75)',fontSize:'1.05rem',marginBottom:6}}>
        Stories, maths, science, history, spelling, puzzles and more!
      </p>
      {gems > 0 && (

// ── Spelling Test (type the word) ──────────────────────────────────────────
function SpellingTest({ test, onDone, onHome, gems }) {
  const [wi,setWi] = React.useState(0);
  const [input,setInput] = React.useState('');
  const [checked,setChecked] = React.useState(null);
  const [score,setScore] = React.useState(0);
  const word = test.words[wi];

  function speak(w) {
    try {
      const u = new SpeechSynthesisUtterance(w);
      u.rate = 0.85; u.lang = 'en-GB';
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }

  React.useEffect(() => { speak(word); }, [wi]);

  function check(e) {
    e.preventDefault();
    if (checked !== null) return;
    const ok = input.trim().toLowerCase() === word.toLowerCase();
    setChecked(ok);
    if (ok) { playCorrect(); setScore(s=>s+1); burstSparkles(window.innerWidth/2, window.innerHeight/2); }
    else playWrong();
  }

  function next() {
    if (wi+1 < test.words.length) { setWi(wi+1); setInput(''); setChecked(null); }
    else { playFanfare(); onDone(score); }
  }

  return (
    <div>
      <Header gems={gems} onHome={onHome}/>

// ── Matching Game ──────────────────────────────────────────────────────────
function MatchPicker({ onPick, onHome, gems }) {
  return <Picker title="Matching Games" items={MATCH_SETS} onPick={onPick} onHome={onHome} gems={gems}/>;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function MatchGame({ set, onDone, onHome, gems }) {
  const [leftCol] = React.useState(() => shuffle(set.pairs.map((p,i)=>({label:p[0],idx:i}))));
  const [rightCol] = React.useState(() => shuffle(set.pairs.map((p,i)=>({label:p[1],idx:i}))));
  const [leftSel,setLeftSel] = React.useState(null);
  const [rightSel,setRightSel] = React.useState(null);
  const [matched,setMatched] = React.useState([]);
  const [wrong,setWrong] = React.useState(null);

  React.useEffect(() => {
    if (leftSel !== null && rightSel !== null) {
      if (leftSel === rightSel) {
        playCorrect();
        burstSparkles(window.innerWidth/2, window.innerHeight/2);
        setMatched(m => [...m, leftSel]);
        setTimeout(() => { setLeftSel(null); setRightSel(null); }, 400);
      } else {
        playWrong();
        setWrong({l:leftSel,r:rightSel});
        setTimeout(() => { setLeftSel(null); setRightSel(null); setWrong(null); }, 600);
      }
    }
  }, [leftSel, rightSel]);

  React.useEffect(() => {
    if (matched.length === set.pairs.length) {
      setTimeout(() => { playFanfare(); onDone(set.pairs.length); }, 500);
    }
  }, [matched]);

  function cls(idx, side) {
    if (matched.includes(idx)) return 'matched';
    if (wrong && ((side==='l'&&wrong.l===idx) || (side==='r'&&wrong.r===idx))) return 'wrong-flash';
    if (side==='l' && leftSel===idx) return 'selected';
    if (side==='r' && rightSel===idx) return 'selected';
    return '';
  }

  return (
    <div>
      <Header gems={gems} onHome={onHome}/>
      <div className="slide-in" style={{padding:'0 20px 40px',maxWidth:520,margin:'0 auto'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:'1.3rem',fontWeight:800}}>{set.icon} {set.title}</div>
          <div style={{fontSize:'0.85rem',color:'rgba(255,255,255,0.6)',marginTop:4}}>{matched.length}/{set.pairs.length} matched</div>
          <div style={{marginTop:8}}><ProgressBar value={matched.length/set.pairs.length}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {leftCol.map(item => (
              <button key={'L'+item.idx} className={`pair-btn ${cls(item.idx,'l')}`}
                disabled={matched.includes(item.idx)}

function MathsSection({ onDone, onHome, gems }) {
  const [tier,setTier] = React.useState(null);
  const [qi,setQi] = React.useState(0);
  const [chosen,setChosen] = React.useState(null);
  const [score,setScore] = React.useState(0);

  const label = {train:'🚂 Train',practise:'📝 Practise',test:'🏆 Test'}[tier];

  function pick(i,e) {
    if (chosen !== null) return;
    setChosen(i);
    const q = qs[qi];
    if (i === q.ans) { playCorrect(); setScore(s=>s+1); if(e) burstSparkles(e.clientX,e.clientY); }
    else playWrong();

  function next() {
    if (qi+1 < qs.length) { setQi(qi+1); setChosen(null); }
    else { playFanfare(); setDone(true); onDone(score); }
  }

  function reset() { setTier(null); setQi(0); setChosen(null); setScore(0); setDone(false); }

  if (!tier) {

                <div style={{fontSize:'0.85rem',opacity:0.75}}>{t.d}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );

  if (done) return null;

  const q = qs[qi];
  return (
    <div>

            <span>{label}</span>
            <span>Q{qi+1}/{qs.length} · {score} ⭐</span>

          <div style={{fontWeight:700,fontSize:'1.05rem',marginBottom:16}}>{q.q}</div>

            {q.opts.map((opt,i) => (
              <button key={i} className={`opt-btn${chosen!==null ? i===q.ans?' correct':i===chosen?' wrong':'' : ''}`} onClick={(e)=>pick(i,e)}>

// ── Times Tables Drill ─────────────────────────────────────────────────────
function TimesDrill({ table, onDone, onHome, gems }) {
  const [qs] = React.useState(() => {
    const qList = [];
    if (table === 'mixed') {
      for (let i = 0; i < 12; i++) {
        const t = TIMES_TABLES[Math.floor(Math.random()*TIMES_TABLES.length)];
        const n = Math.floor(Math.random()*12)+1;
        qList.push({a:t,b:n,ans:t*n});
      }
    } else {
      for (let n = 1; n <= 12; n++) qList.push({a:table,b:n,ans:table*n});
    }
    return qList;
  });
  const [qi,setQi] = React.useState(0);
  const [input,setInput] = React.useState('');
  const [checked,setChecked] = React.useState(null);
  const [score,setScore] = React.useState(0);
  const q = qs[qi];

  function check(e) {
    e.preventDefault();
    if (checked !== null) return;
    const ok = parseInt(input) === q.ans;
    setChecked(ok);
    if (ok) { playCorrect(); setScore(s=>s+1); burstSparkles(window.innerWidth/2, window.innerHeight/2); }
    else playWrong();
  }

  function next() {
    if (qi+1 < qs.length) { setQi(qi+1); setInput(''); setChecked(null); }
    else { playFanfare(); onDone(score); }
  }

  const title = table === 'mixed' ? '🎲 Mixed Tables' : `${table}× Table`;
  return (
    <div>
      <Header gems={gems} onHome={onHome}/>
      <div className="slide-in" style={{padding:'0 20px 40px',maxWidth:420,margin:'0 auto'}}>
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:'0.85rem',color:'rgba(255,255,255,0.6)'}}>
            <span>✖️ {title}</span>
            <span>{qi+1}/{qs.length} · {score} ⭐</span>
          </div>
          <ProgressBar value={qi/qs.length}/>
        </div>
        <div className="card pop" key={qi} style={{padding:28,marginBottom:16,textAlign:'center'}}>
          <div style={{fontSize:'2.4rem',fontWeight:900,marginBottom:20,color:'#fbbf24'}}>{q.a} × {q.b} = ?</div>
          <form onSubmit={check}>
            <input className="type-in" type="number" autoFocus inputMode="numeric"
              value={input} onChange={e=>setInput(e.target.value)} disabled={checked!==null}
              placeholder="?" style={{marginBottom:14,textAlign:'center',fontSize:'1.6rem',maxWidth:150,margin:'0 auto 14px'}}/>
            {checked === null && (
              <div><button className="btn-primary" type="submit" disabled={!input.trim()}>Check ✓</button></div>
            )}
          </form>
          {checked !== null && (
            <div style={{marginTop:14,padding:'12px 14px',borderRadius:12,background:checked?'rgba(16,185,129,0.2)':'rgba(239,68,68,0.2)',border:`1px solid ${checked?'#10b981':'#ef4444'}`}}>
              <div style={{fontWeight:700}}>{checked?'🌟 Correct!':`💡 Answer: ${q.ans}`}</div>
            </div>
          )}
        </div>
        {checked !== null && (
          <div style={{textAlign:'center'}}>
            <button className="btn-primary" onClick={next}>{qi+1 < qs.length ? 'Next →' : 'Finish! 🎉'}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Times Tables Speed Test ────────────────────────────────────────────────
function TimesSpeed({ onDone, onHome, gems }) {
  const [qs] = React.useState(() => {
    const qList = [];
    for (let i = 0; i < 20; i++) {
      const t = TIMES_TABLES[Math.floor(Math.random()*TIMES_TABLES.length)];
      const n = Math.floor(Math.random()*12)+1;
      qList.push({a:t,b:n,ans:t*n});
    }
    return qList;
  });
  const [qi,setQi] = React.useState(0);
  const [input,setInput] = React.useState('');
  const [score,setScore] = React.useState(0);
  const [time,setTime] = React.useState(60);
  const [done,setDone] = React.useState(false);

  React.useEffect(() => {
    if (done) return;
    if (time <= 0) { playFanfare(); setDone(true); onDone(score); return; }
    const t = setTimeout(() => setTime(time-1), 1000);
    return () => clearTimeout(t);
  }, [time, done]);

  function submit(e) {
    e.preventDefault();
    if (done) return;
    const q = qs[qi];
    if (parseInt(input) === q.ans) { playCorrect(); setScore(s=>s+1); }
    else playWrong();
    setInput('');
    if (qi+1 < qs.length) setQi(qi+1);
    else { playFanfare(); setDone(true); onDone(score+(parseInt(input)===q.ans?1:0)); }
  }

  if (done) return null;
  const q = qs[qi];
  return (
    <div>
      <Header gems={gems} onHome={onHome}/>
      <div className="slide-in" style={{padding:'0 20px 40px',maxWidth:420,margin:'0 auto'}}>
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:'0.9rem'}}>
            <span style={{color:'#fbbf24',fontWeight:700}}>⚡ Speed Test</span>
            <span style={{color:time<=10?'#ef4444':'#fbbf24',fontWeight:800,fontSize:'1.1rem'}}>⏱️ {time}s · {score} ⭐</span>
          </div>
          <ProgressBar value={(60-time)/60}/>
        </div>
        <div className="card pop" key={qi} style={{padding:28,textAlign:'center'}}>
          <div style={{fontSize:'2.4rem',fontWeight:900,marginBottom:20,color:'#fbbf24'}}>{q.a} × {q.b} = ?</div>
          <form onSubmit={submit}>
            <input className="type-in" type="number" autoFocus inputMode="numeric"
              value={input} onChange={e=>setInput(e.target.value)}
              style={{marginBottom:14,textAlign:'center',fontSize:'1.6rem',maxWidth:150,margin:'0 auto 14px'}}/>
            <div><button className="btn-primary" type="submit" disabled={!input.trim()}>Go! →</button></div>
          </form>
        </div>
      </div>
    </div>
  );
}

function Result({ score, total, earned, passed, gems, robuxTarget, onHome }) {
  const pct = total > 0 ? score / total : 0;
  const msg = !passed ? 'Try again!' : pct === 1 ? 'Perfect!' : pct >= 0.75 ? 'Brilliant!' : 'Good work!';
  const emoji = !passed ? '💪' : pct === 1 ? '🏆' : pct >= 0.75 ? '🌟' : '💫';
  const robuxEarned = gems || 0;
  const target = robuxTarget || 200;
  const robuxPct = Math.min(robuxEarned / target, 1);
  React.useEffect(() => { if(passed) playFanfare(); else playWrong(); }, []);
  return (
    <div className="slide-in" style={{padding:'40px 20px',maxWidth:400,margin:'0 auto',textAlign:'center'}}>
      <div className="float" style={{fontSize:'4.5rem',marginBottom:12}}>{emoji}</div>

      <p style={{color:'rgba(255,255,255,0.75)',fontSize:'1.1rem',marginBottom:6}}>
        You got <strong style={{color:'#fbbf24'}}>{score}</strong> out of <strong>{total}</strong>
        {!passed && <span style={{color:'#ef4444'}}> (need 60% to earn gems)</span>}
      </p>
      {passed ? (
        <p style={{color:'#fbbf24',fontSize:'1rem',marginBottom:10}}>+{earned} 💎 earned!</p>
      ) : (
        <p style={{color:'#ef4444',fontSize:'0.95rem',marginBottom:10}}>No gems this time. Try again and get more right!</p>
      )}
      {passed && <Stars count={earned}/>}

      <div style={{marginTop:20,padding:16,background:'rgba(255,255,255,0.06)',borderRadius:14}}>
        <div style={{fontSize:'0.85rem',color:'rgba(255,255,255,0.7)',marginBottom:6}}>Weekly Robux Progress</div>
        <div style={{display:'flex',alignItems:'center',gap:10,justifyContent:'center',marginBottom:8}}>
          <span style={{fontSize:'1.4rem'}}>💰</span>
          <span style={{fontSize:'1.3rem',fontWeight:900,color:'#10b981'}}>{robuxEarned} / {target}</span>
        </div>
        <div className="progress-bar" style={{height:12,borderRadius:6}}>
          <div className="progress-fill" style={{width:`${robuxPct*100}%`,height:'100%',borderRadius:6,background:robuxPct>=1?'linear-gradient(90deg,#10b981,#06b6d4)':'linear-gradient(90deg,#ec4899,#8b5cf6)'}}/>
        </div>
        {robuxPct >= 1 && <div style={{marginTop:8,color:'#10b981',fontWeight:700}}>🎉 Target reached! Show mum!</div>}
      </div>

      <div style={{marginTop:20}}>
        <button className="btn-primary" onClick={onHome}>🏠 Back to Home</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const saved = loadState();
  const [screen,setScreen] = React.useState('welcome');
  const [gems,setGems] = React.useState(saved.gems || 0);
  const [category,setCategory] = React.useState(null);
  const [currentItem,setCurrentItem] = React.useState(null);
  const [lastResult,setLastResult] = React.useState(null);
  const [history,setHistory] = React.useState(saved.history || []);
  const [questCompleted,setQuestCompleted] = React.useState(saved.questCompleted || {});
  const [robuxPerGem,setRobuxPerGem] = React.useState(saved.robuxPerGem || 1);
  const [pendingQuestKey,setPendingQuestKey] = React.useState(null);

  React.useEffect(() => { saveState({gems, history, questCompleted, robuxPerGem}); }, [gems, history, questCompleted, robuxPerGem]);

  function goHome() { setScreen('home'); setCategory(null); setCurrentItem(null); }

  function pickCategory(cat) {
    setCategory(cat);
    if (cat === 'stories') setScreen('storyPicker');
    else if (cat === 'science') setScreen('sciencePicker');
    else if (cat === 'history') setScreen('historyPicker');
    else if (cat === 'geography') setScreen('geoPicker');
    else if (cat === 're') setScreen('rePicker');
    else if (cat === 'spelling') setScreen('spellingPicker');
    else if (cat === 'match') setScreen('matchPicker');
    else if (cat === 'odd') setScreen('odd');
    else if (cat === 'short') setScreen('short');
    else if (cat === 'maths') setScreen('maths');
    else if (cat === 'prep') setScreen('prep');
    else if (cat === 'times') setScreen('timesPicker');
    else if (cat === 'grammar') setScreen('grammarPicker');
    else if (cat === 'speed') setScreen('timesSpeed');
    else if (cat === 'writing') setScreen('writing');
    else if (cat === 'drawing') setScreen('drawing');
    else if (cat === 'quests') setScreen('quests');
    else if (cat === 'report') setScreen('report');
  }

  function launchQuestActivity(day, act) {
    const key = `${day}-${act.type}-${act.id||''}-${act.label}`;
    setPendingQuestKey(key);
    // If type has no quiz (drawing/writing), mark complete immediately
    if (act.type === 'drawing' || act.type === 'writing') {
      setQuestCompleted(qc => ({...qc, [key]: true}));
      setHistory(h => [...h, {label:act.label, score:1, when:Date.now()}]);
      setGems(g => g+1);
      setPendingQuestKey(null);
      return;
    }
    // Launch the matching activity screen
    setCurrentItem(act.id || null);
    const map = {
      story:'storyRead', science:'scienceTeach', history:'historyTeach', geography:'geoTeach',
      re:'reTeach', spelling:'spellingTest', match:'matchGame', odd:'odd', short:'short',
      maths:'maths', prep:'prep', times:'timesDrill', grammar:'grammarTeach'
    };
    setScreen(map[act.type] || 'home');
  }

  function finishActivity(score, total, label) {
    // Quality gate: must get at least 60% to earn gems
    const pct = total > 0 ? score / total : 0;
    const earned = pct >= 0.6 ? score : 0;
    const passed = pct >= 0.6;

    const newGems = gems + earned;
    setGems(newGems);
    setLastResult({score, total, earned, passed});
    const newHistory = [...history, {label: label || 'Activity', score, earned, when:Date.now()}].slice(-50);
    setHistory(newHistory);
    if (pendingQuestKey && passed) {
      setQuestCompleted(qc => ({...qc, [pendingQuestKey]: true}));
    }
    setPendingQuestKey(null);
    // Track to Supabase
    trackActivity(label || 'Activity', category || 'quiz', score, total);
    if (earned > 0) syncStarStats(newGems, newHistory.length);
    setScreen('result');
  }

  function setRate() {
    const v = prompt('How many Robux per 💎 gem?', String(robuxPerGem));
    if (v !== null && !isNaN(parseInt(v)) && parseInt(v) >= 0) {
      setRobuxPerGem(parseInt(v));
    }
  }

  function resetProgress() {
    if (confirm('Reset all your gems and progress?')) {
      setGems(0); setHistory([]); setQuestCompleted({});
      saveState({gems:0, history:[], questCompleted:{}, robuxPerGem});
    }
  }

  const storyMap = Object.fromEntries(STORIES.map(s => [s.id, s]));
  const scienceMap = Object.fromEntries(SCIENCE_LESSONS.map(s => [s.id, s]));
  const historyMap = Object.fromEntries(HISTORY_LESSONS.map(s => [s.id, s]));
  const geoMap = Object.fromEntries(GEOGRAPHY_LESSONS.map(s => [s.id, s]));
  const reMap = Object.fromEntries(RE_LESSONS.map(s => [s.id, s]));
  const spellMap = Object.fromEntries(SPELLING_TESTS.map(s => [s.id, s]));
  const matchMap = Object.fromEntries(MATCH_SETS.map(s => [s.id, s]));
  const grammarMap = Object.fromEntries(GRAMMAR_LESSONS.map(s => [s.id, s]));

  return (
    <div style={{minHeight:'100vh',paddingBottom:40}}>
      {screen === 'welcome' && <Welcome gems={gems} onStart={() => setScreen('home')}/>}
      {screen === 'home' && <Home gems={gems} robux={gems*robuxPerGem} onPick={pickCategory} onReset={resetProgress}/>}
      {screen === 'quests' && <DailyQuests completed={questCompleted} gems={gems} robuxPerGem={robuxPerGem}
        onLaunch={launchQuestActivity} onHome={goHome}/>}
      {screen === 'report' && <ReportScreen gems={gems} completed={questCompleted} history={history}
        robuxPerGem={robuxPerGem} onHome={goHome} onSetRate={setRate}/>}
      {screen === 'writing' && <WritingPrompts gems={gems} onHome={goHome}/>}
      {screen === 'drawing' && <DrawingIdeas gems={gems} onHome={goHome}/>}
      {screen === 'timesSpeed' && <TimesSpeed gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, 20, 'Times Tables Speed Test')}/>}

      {/* Stories */}
      {screen === 'storyPicker' && <Picker title="Stories" items={STORIES} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('storyRead'); }}/>}
      {screen === 'storyRead' && currentItem && <Reading story={storyMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('storyQuiz')}/>}
      {screen === 'storyQuiz' && currentItem && <Quiz title={storyMap[currentItem].title} icon={storyMap[currentItem].icon}
        questions={storyMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, storyMap[currentItem].qs.length, "📖 " + storyMap[currentItem].title)}/>}

      {/* Science */}
      {screen === 'sciencePicker' && <Picker title="Science" items={SCIENCE_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('scienceTeach'); }}/>}
      {screen === 'scienceTeach' && currentItem && <Teach lesson={scienceMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('scienceQuiz')}/>}
      {screen === 'scienceQuiz' && currentItem && <Quiz title={scienceMap[currentItem].title} icon={scienceMap[currentItem].icon}
        questions={scienceMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, scienceMap[currentItem].qs.length, "🔬 " + scienceMap[currentItem].title)}/>}

      {/* History */}
      {screen === 'historyPicker' && <Picker title="History" items={HISTORY_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('historyTeach'); }}/>}
      {screen === 'historyTeach' && currentItem && <Teach lesson={historyMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('historyQuiz')}/>}
      {screen === 'historyQuiz' && currentItem && <Quiz title={historyMap[currentItem].title} icon={historyMap[currentItem].icon}
        questions={historyMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, historyMap[currentItem].qs.length, "🏛️ " + historyMap[currentItem].title)}/>}

      {/* Geography */}
      {screen === 'geoPicker' && <Picker title="Geography" items={GEOGRAPHY_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('geoTeach'); }}/>}
      {screen === 'geoTeach' && currentItem && <Teach lesson={geoMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('geoQuiz')}/>}
      {screen === 'geoQuiz' && currentItem && <Quiz title={geoMap[currentItem].title} icon={geoMap[currentItem].icon}
        questions={geoMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, geoMap[currentItem].qs.length, "🌍 " + geoMap[currentItem].title)}/>}

      {/* RE */}
      {screen === 'rePicker' && <Picker title="RE" items={RE_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('reTeach'); }}/>}
      {screen === 'reTeach' && currentItem && <Teach lesson={reMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('reQuiz')}/>}
      {screen === 'reQuiz' && currentItem && <Quiz title={reMap[currentItem].title} icon={reMap[currentItem].icon}
        questions={reMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, reMap[currentItem].qs.length, "🕊️ " + reMap[currentItem].title)}/>}

      {/* Spelling */}
      {screen === 'spellingPicker' && <Picker title="Spelling" items={SPELLING_TESTS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('spellingTest'); }}/>}
      {screen === 'spellingTest' && currentItem && <SpellingTest test={spellMap[currentItem]} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, spellMap[currentItem].words.length, "✏️ " + spellMap[currentItem].title)}/>}

      {/* Matching */}
      {screen === 'matchPicker' && <MatchPicker gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('matchGame'); }}/>}
      {screen === 'matchGame' && currentItem && <MatchGame set={matchMap[currentItem]} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, matchMap[currentItem].pairs.length, "🎴 " + matchMap[currentItem].title)}/>}

      {/* Odd One Out */}
      {screen === 'odd' && <OddOneOut gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, ODD_PUZZLES.length, "🔍 Odd One Out")}/>}

      {/* Short Answer */}
      {screen === 'short' && <ShortAnswer gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, SHORT_ANSWER.length, "💭 Short Answer")}/>}

      {/* Maths */}
      {screen === 'maths' && <MathsSection gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, 10, "🔢 Maths")}/>}

      {/* 11+ Prep */}
      {screen === 'prep' && <Quiz title="11+ Prep" icon="🎓" questions={PREP_QUESTIONS} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, PREP_QUESTIONS.length, "🎓 11+ Prep")}/>}

      {/* Times Tables */}
      {screen === 'timesPicker' && <TimesPicker gems={gems} onHome={goHome}
        onPick={t => { setCurrentItem(t); setScreen('timesDrill'); }}/>}
      {screen === 'timesDrill' && currentItem !== null && <TimesDrill table={currentItem} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, 12, `✖️ ${currentItem === 'mixed' ? 'Mixed Tables' : currentItem+'× Table'}`)}/>}

      {/* Grammar */}
      {screen === 'grammarPicker' && <Picker title="Grammar" items={GRAMMAR_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('grammarTeach'); }}/>}
      {screen === 'grammarTeach' && currentItem && <Teach lesson={grammarMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('grammarQuiz')}/>}
      {screen === 'grammarQuiz' && currentItem && <Quiz title={grammarMap[currentItem].title} icon={grammarMap[currentItem].icon}
        questions={grammarMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, grammarMap[currentItem].qs.length, "📝 " + grammarMap[currentItem].title)}/>}

      {/* Result */}
      {screen === 'result' && lastResult && <Result score={lastResult.score} total={lastResult.total} earned={lastResult.earned} passed={lastResult.passed} gems={gems} robuxTarget={400} onHome={goHome}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

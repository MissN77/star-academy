// ── Audio ──────────────────────────────────────────────────────────────────
function playCorrect() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523,659,784].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f; o.type='sine';
      g.gain.setValueAtTime(0.15,ctx.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.25);
      o.start(ctx.currentTime+i*0.12); o.stop(ctx.currentTime+i*0.12+0.25);
    });
  } catch(e){}
}
function playWrong() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=220; o.type='sawtooth';
    g.gain.setValueAtTime(0.1,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    o.start(); o.stop(ctx.currentTime+0.35);
  } catch(e){}
}
function playFanfare() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f; o.type='triangle';
      g.gain.setValueAtTime(0.15,ctx.currentTime+i*0.1);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.5);
      o.start(ctx.currentTime+i*0.1); o.stop(ctx.currentTime+i*0.1+0.5);
    });
  } catch(e){}
}

// ── Sparkles ───────────────────────────────────────────────────────────────
function burstSparkles(x, y) {
  const emojis = ['✨','⭐','💖','🌟','💫'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (Math.PI * 2 * i) / 8;
    const dx = Math.cos(angle) * 60;
    const dy = Math.sin(angle) * 60;
    s.style.left = (x + dx) + 'px';
    s.style.top = (y + dy) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}

// ── Storage ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'star-academy-v2';
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

  { id:'luna', title:'Luna and the Shadow Stone', icon:'🌙', grad:'linear-gradient(135deg,#f59e0b,#f97316)',
    text:`Luna was no ordinary girl. By day she went to school and painted pictures of dragons. By night she hunted shadows.
The shadows had been creeping out of the Forest of Whispers for three weeks, turning the village cats into grumpy statues. Luna's mum said it was just the cold weather. Luna knew better.
On Tuesday evening, Luna packed her bag: one torch, three tangerines, a notebook, and her lucky K-pop badge with a tiny star on it. She marched into the forest.
Deep inside, on a mossy rock, sat the Shadow Stone, a swirling dark gem the size of a grapefruit. Luna opened her notebook and read the counter-spell she had written in purple ink. As she spoke the words, the stone cracked. Light poured out. Every shadow curled up like smoke and vanished.
On her way home, Luna ate all three tangerines. She felt that was fair.`,

    ]},
  { id:'starfall', title:'The Missing Microphone', icon:'🎤', grad:'linear-gradient(135deg,#f43f5e,#ec4899)',
    text:`Sora was the lead singer of a five-member group called Starfall. Their biggest concert was tomorrow night, and something dreadful had happened. Her favourite microphone was gone.
"We have to be methodical about this," said her bandmate Jay, pulling out a notebook. "Let us retrace every step."
Sora thought hard. After rehearsal she had placed the microphone on the prop table near the velvet curtain. Then she had gone to eat noodles. Then she had returned, and it had vanished.
The group searched the entire venue. They checked the storage room, the costume rail, and even the snack fridge (Jay had suggested that last one). Nothing.
It was their youngest member, Bora, who solved the mystery. She noticed a sparkling trail of glitter leading behind the speaker stack. There, curled up and fast asleep on the microphone, was a fluffy ginger cat. It had apparently decided the microphone was the finest pillow in the building.
Sora laughed so hard her sides hurt. She borrowed a spare microphone for the concert. The cat was given a name, Starfall, and became the group's unofficial mascot.`,

  { id:'tower', title:'The Wobbling Tower', icon:'🏗️', grad:'linear-gradient(135deg,#10b981,#06b6d4)',
    text:`Mia had one ambition for the school craft fair: to build the tallest cardboard tower in the history of Maple Street Primary. She had spent three evenings cutting, folding, and stacking cardboard tubes.
By Friday morning, the tower stood at one metre and twelve centimetres. It was impressive. It was also, unfortunately, wobbling.
"Reinforce the base," suggested her older brother Theo, who was studying engineering at college and therefore felt entitled to give advice about everything.
Mia added extra card around the bottom and secured it with a generous loop of tape. The wobble reduced to a gentle sway.
At the fair, the judges walked slowly around every entry. There was a papier-mâché volcano, a woven basket, and a rather lopsided robot. Mia held her breath.
Then her tower swayed, just slightly, and the judge smiled. "Remarkable," she said. "It moves with the air like a real skyscraper."
Mia had not planned that. She decided not to mention it.
She won first prize: a shiny silver rosette and a voucher for the craft shop. The tower stood in the school corridor for the rest of term, swaying serenely, as if it had always meant to.`,

  { id:'giggle', title:'The Giggle Room', icon:'🎪', grad:'linear-gradient(135deg,#6366f1,#7c3aed)',
    text:`Pepper had explored most of Dandy's World, but she had never opened the door marked GIGGLE ROOM. Today she pushed it open.
Inside, everything was upside down. The chairs hung from the ceiling. The lamps grew out of the floor. A painting of a serious-looking cat was laughing.
"Welcome!" said a voice. It belonged to a small figure made entirely of bouncy balls, who introduced himself as Boinks. "The rule here is simple: whatever you say comes out backwards."
Pepper tried to say "hello" and instead said "olleh." She tried to say "this is strange" and instead said "egnarts si siht."
Boinks found this uproarious. He bounced off three walls and a hanging chair.
"How do I leave?" Pepper asked, or tried to. What came out was "evael I od woh."
Boinks pointed to a trapdoor in the ceiling. Pepper climbed the upside-down ladder, pushed through the trapdoor, and landed back in the normal corridor with a soft thump.
She looked back at the door. It now read MOOR ELGGIG.
"Of course it does," she said, and walked away.`,

  { id:'seahorse', title:'The Lost Seahorse', icon:'🐴', grad:'linear-gradient(135deg,#06b6d4,#3b82f6)',
    text:`Coral the seahorse had drifted far from her family. A strong current had pulled her away from the reef while she was chasing a tiny shrimp. Now she was somewhere cold and dark.
"Do not panic," she told herself firmly. Her mother had always said that a calm seahorse is a clever seahorse.
She followed a stream of silver bubbles upwards. They led her to a kind old octopus called Mr Ink, who was reading a book on a flat grey rock.
"Lost, little one?" he asked, peering over his spectacles.
Coral nodded. "I need to find the Rainbow Reef."
Mr Ink smiled and pointed with one long arm. "Swim towards the pink coral, then left at the shipwreck, then straight until you see the dolphins dancing. Do not take any shortcuts through the kelp forest, it is very tangly today."
Coral thanked him and swam off. She followed his directions exactly, and by sunset she was curled up safe in the Rainbow Reef, telling her brothers and sisters all about the octopus who read books.`,

  { id:'pancake', title:'Pancake Panic', icon:'🥞', grad:'linear-gradient(135deg,#f59e0b,#ef4444)',
    text:`It was Saturday morning, and Ella had decided she would make pancakes all by herself. Her grandma was still upstairs.
Ella measured the flour carefully into a bowl. She cracked in two eggs (only one shell fell in, which she fished out with a spoon). She poured in the milk and stirred until the lumps disappeared.
Then she heated the pan, just as her grandma had shown her, and spooned in the first dollop of batter. She waited, then flipped the pancake with a tremendous swish of the spatula.
The pancake flew straight up, stuck to the ceiling, hovered for a dramatic moment, and flopped back down. It landed neatly in the pan.
Grandma appeared in the doorway at exactly that moment. She looked at the pan, then at the ceiling (which had a small round greasy mark), then at Ella.
"Next time, a smaller flip," she said, and started making tea.
They ate ten pancakes between them with lemon and sugar. Ella told the story at school for a whole week.`,

  { id:'robot', title:'The Robot Who Wanted to Dance', icon:'🤖', grad:'linear-gradient(135deg,#8b5cf6,#ec4899)',
    text:`Bolt was a kitchen robot. His job was to stir soup, chop carrots, and wipe down the counters. He was excellent at all three.
But every evening, when the kitchen was quiet, Bolt watched the family's television through the doorway. He saw people on a dance show, twirling and leaping, and something inside his circuits hummed.
One Tuesday, Bolt tried a little shuffle while stirring the soup. His left wheel squeaked. He tried a spin while chopping carrots. He knocked over the salt.
The family's youngest child, Noor, noticed. "You want to dance, don't you?" she said.
Bolt made a small beeping sound that meant yes.
Noor stood on a chair and held his metal hand. She counted to three. Together they twirled across the kitchen tiles, one little girl and one squeaky robot, while the soup simmered politely on the stove.
Noor oiled his wheels after. The next Tuesday, they danced again.`,

  { id:'dragon', title:'The Polite Dragon', icon:'🐉', grad:'linear-gradient(135deg,#ef4444,#f59e0b)',
    text:`In the small kingdom of Thistledown, there lived a dragon called Periwinkle. He was not like other dragons. He did not steal gold. He did not eat knights. He said please and thank you.
The villagers were confused. They had written a long list of dragon-fighting plans. They had built a special dragon trap out of old barrels. None of it seemed necessary.
One morning, Periwinkle flew gently down to the village square. "Excuse me," he said. "Do you have any books about gardening?"
The villagers blinked. The librarian, whose name was Martha, recovered first.
"We have three," she said. "Would you like to borrow them?"
Periwinkle nodded politely. He returned them exactly one week later, each one unburnt and in perfect condition. He borrowed three more. Then three more.
By the end of the year, Periwinkle had the finest rose garden for miles. The villagers held a small tea party in it, and nobody mentioned the barrel trap ever again.`,

  { id:'moon', title:'The Moon-Bounce Party', icon:'🌙', grad:'linear-gradient(135deg,#6366f1,#06b6d4)',
    text:`Astra had been invited to her first party on the Moon. Her cousin Vega lived in one of the space stations, and she had organised a bouncing party in the low-gravity hall.
Astra packed carefully: her silver helmet, her special bouncy boots, a present wrapped in stars, and a small bag of space marshmallows.
When she arrived, the hall was full of children floating three metres into the air with every small jump. Music played from speakers on the ceiling. A banner said HAPPY 8TH, VEGA!
Astra took a breath, ran, and jumped. She flew higher than she expected and accidentally somersaulted twice before landing, giggling, on a soft blue cushion.
"You are a natural!" said Vega, who was eating marshmallows upside down.
They bounced for two whole hours. They played a game where you had to catch a floating balloon while spinning. Astra won twice.
On the way home in the shuttle, Astra fell asleep holding her empty marshmallow bag.`,

  { id:'library', title:'The Whispering Library', icon:'📚', grad:'linear-gradient(135deg,#10b981,#6366f1)',
    text:`The library on Primrose Lane had a secret. Every book there could whisper its own story to you, but only if you were very quiet.
Hassan discovered this by accident on a rainy Wednesday. He had gone in to escape the rain, and he was sitting in a beanbag with a book about pirates on his lap.
"Turn the page, lad," said a tiny voice.
Hassan looked around. Nobody. He looked at the book. The book looked back.
"Go on," it whispered. "The next bit is my favourite."
Hassan turned the page. The book chuckled softly and began to tell him about a pirate who was scared of crabs.
Hassan read for an hour without noticing the time. When he stood up to leave, the book said "Come back tomorrow, there is a much better chapter."
He did. He came back every Wednesday for the rest of the term. He always chose a different book. Each one whispered. Each one was kind.
He never told anyone. Some secrets are too nice to share.`,

function Stars({ count }) {
  return (
    <div style={{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',marginTop:6}}>
      {Array.from({length:Math.min(count,10)}).map((_,i) => (
        <span key={i} style={{fontSize:'1.2rem',animation:`star-spin ${2+i*0.3}s linear infinite`}}>⭐</span>
      ))}
    </div>
  );
}

function Header({ gems, onHome, title }) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',gap:10}}>
      <button className="btn-ghost" onClick={onHome} style={{fontSize:'0.85rem'}}>🏠 Home</button>

        💎 {gems}

    </div>
  );
}

  return (

}

// ── Matching Game ──────────────────────────────────────────────────────────
function MatchPicker({ onPick, onHome, gems }) {
  return <Picker title="Matching Games" items={MATCH_SETS} onPick={onPick} onHome={onHome} gems={gems}/>;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function MatchGame({ set, onDone, onHome, gems }) {
  const [leftCol] = React.useState(() => shuffle(set.pairs.map((p,i)=>({label:p[0],idx:i}))));
  const [rightCol] = React.useState(() => shuffle(set.pairs.map((p,i)=>({label:p[1],idx:i}))));
  const [leftSel,setLeftSel] = React.useState(null);
  const [rightSel,setRightSel] = React.useState(null);
  const [matched,setMatched] = React.useState([]);
  const [wrong,setWrong] = React.useState(null);

  React.useEffect(() => {
    if (leftSel !== null && rightSel !== null) {
      if (leftSel === rightSel) {
        playCorrect();
        burstSparkles(window.innerWidth/2, window.innerHeight/2);
        setMatched(m => [...m, leftSel]);
        setTimeout(() => { setLeftSel(null); setRightSel(null); }, 400);
      } else {
        playWrong();
        setWrong({l:leftSel,r:rightSel});
        setTimeout(() => { setLeftSel(null); setRightSel(null); setWrong(null); }, 600);
      }
    }
  }, [leftSel, rightSel]);

  React.useEffect(() => {
    if (matched.length === set.pairs.length) {
      setTimeout(() => { playFanfare(); onDone(set.pairs.length); }, 500);
    }
  }, [matched]);

  function cls(idx, side) {
    if (matched.includes(idx)) return 'matched';
    if (wrong && ((side==='l'&&wrong.l===idx) || (side==='r'&&wrong.r===idx))) return 'wrong-flash';
    if (side==='l' && leftSel===idx) return 'selected';
    if (side==='r' && rightSel===idx) return 'selected';
    return '';
  }

  return (
    <div>
      <Header gems={gems} onHome={onHome}/>
      <div className="slide-in" style={{padding:'0 20px 40px',maxWidth:520,margin:'0 auto'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:'1.3rem',fontWeight:800}}>{set.icon} {set.title}</div>
          <div style={{fontSize:'0.85rem',color:'rgba(255,255,255,0.6)',marginTop:4}}>{matched.length}/{set.pairs.length} matched</div>
          <div style={{marginTop:8}}><ProgressBar value={matched.length/set.pairs.length}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {leftCol.map(item => (
              <button key={'L'+item.idx} className={`pair-btn ${cls(item.idx,'l')}`}
                disabled={matched.includes(item.idx)}
                onClick={() => setLeftSel(item.idx)}>{item.label}</button>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {rightCol.map(item => (
              <button key={'R'+item.idx} className={`pair-btn ${cls(item.idx,'r')}`}
                disabled={matched.includes(item.idx)}
                onClick={() => setRightSel(item.idx)}>{item.label}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

  const [category,setCategory] = React.useState(null);
  const [currentItem,setCurrentItem] = React.useState(null);
  const [lastResult,setLastResult] = React.useState(null);

  React.useEffect(() => { saveState({gems}); }, [gems]);

  function goHome() { setScreen('home'); setCategory(null); setCurrentItem(null); }

  function pickCategory(cat) {
    setCategory(cat);
    if (cat === 'stories') setScreen('storyPicker');
    else if (cat === 'science') setScreen('sciencePicker');
    else if (cat === 'history') setScreen('historyPicker');
    else if (cat === 'geography') setScreen('geoPicker');
    else if (cat === 're') setScreen('rePicker');
    else if (cat === 'spelling') setScreen('spellingPicker');
    else if (cat === 'match') setScreen('matchPicker');
    else if (cat === 'odd') setScreen('odd');
    else if (cat === 'short') setScreen('short');
    else if (cat === 'maths') setScreen('maths');
    else if (cat === 'prep') setScreen('prep');
  }

  function finishActivity(score, total) {
    setGems(g => g + score);
    setLastResult({score, total});
    setScreen('result');
  }

  function resetProgress() {
    if (confirm('Reset all your gems and progress?')) {
      setGems(0);
      saveState({gems:0});
    }
  }

  const storyMap = Object.fromEntries(STORIES.map(s => [s.id, s]));
  const scienceMap = Object.fromEntries(SCIENCE_LESSONS.map(s => [s.id, s]));
  const historyMap = Object.fromEntries(HISTORY_LESSONS.map(s => [s.id, s]));
  const geoMap = Object.fromEntries(GEOGRAPHY_LESSONS.map(s => [s.id, s]));
  const reMap = Object.fromEntries(RE_LESSONS.map(s => [s.id, s]));
  const spellMap = Object.fromEntries(SPELLING_TESTS.map(s => [s.id, s]));
  const matchMap = Object.fromEntries(MATCH_SETS.map(s => [s.id, s]));

  return (
    <div style={{minHeight:'100vh',paddingBottom:40}}>
      {screen === 'welcome' && <Welcome gems={gems} onStart={() => setScreen('home')}/>}
      {screen === 'home' && <Home gems={gems} onPick={pickCategory} onReset={resetProgress}/>}

      {/* Stories */}
      {screen === 'storyPicker' && <Picker title="Stories" items={STORIES} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('storyRead'); }}/>}
      {screen === 'storyRead' && currentItem && <Reading story={storyMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('storyQuiz')}/>}
      {screen === 'storyQuiz' && currentItem && <Quiz title={storyMap[currentItem].title} icon={storyMap[currentItem].icon}
        questions={storyMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, storyMap[currentItem].qs.length)}/>}

      {/* Science */}
      {screen === 'sciencePicker' && <Picker title="Science" items={SCIENCE_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('scienceTeach'); }}/>}
      {screen === 'scienceTeach' && currentItem && <Teach lesson={scienceMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('scienceQuiz')}/>}
      {screen === 'scienceQuiz' && currentItem && <Quiz title={scienceMap[currentItem].title} icon={scienceMap[currentItem].icon}
        questions={scienceMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, scienceMap[currentItem].qs.length)}/>}

      {/* History */}
      {screen === 'historyPicker' && <Picker title="History" items={HISTORY_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('historyTeach'); }}/>}
      {screen === 'historyTeach' && currentItem && <Teach lesson={historyMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('historyQuiz')}/>}
      {screen === 'historyQuiz' && currentItem && <Quiz title={historyMap[currentItem].title} icon={historyMap[currentItem].icon}
        questions={historyMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, historyMap[currentItem].qs.length)}/>}

      {/* Geography */}
      {screen === 'geoPicker' && <Picker title="Geography" items={GEOGRAPHY_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('geoTeach'); }}/>}
      {screen === 'geoTeach' && currentItem && <Teach lesson={geoMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('geoQuiz')}/>}
      {screen === 'geoQuiz' && currentItem && <Quiz title={geoMap[currentItem].title} icon={geoMap[currentItem].icon}
        questions={geoMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, geoMap[currentItem].qs.length)}/>}

      {/* RE */}
      {screen === 'rePicker' && <Picker title="RE" items={RE_LESSONS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('reTeach'); }}/>}
      {screen === 'reTeach' && currentItem && <Teach lesson={reMap[currentItem]} gems={gems} onHome={goHome}
        onReady={() => setScreen('reQuiz')}/>}
      {screen === 'reQuiz' && currentItem && <Quiz title={reMap[currentItem].title} icon={reMap[currentItem].icon}
        questions={reMap[currentItem].qs} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, reMap[currentItem].qs.length)}/>}

      {/* Spelling */}
      {screen === 'spellingPicker' && <Picker title="Spelling" items={SPELLING_TESTS} gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('spellingTest'); }}/>}
      {screen === 'spellingTest' && currentItem && <SpellingTest test={spellMap[currentItem]} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, spellMap[currentItem].words.length)}/>}

      {/* Matching */}
      {screen === 'matchPicker' && <MatchPicker gems={gems} onHome={goHome}
        onPick={id => { setCurrentItem(id); setScreen('matchGame'); }}/>}
      {screen === 'matchGame' && currentItem && <MatchGame set={matchMap[currentItem]} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, matchMap[currentItem].pairs.length)}/>}

      {/* Odd One Out */}
      {screen === 'odd' && <OddOneOut gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, ODD_PUZZLES.length)}/>}

      {/* Short Answer */}
      {screen === 'short' && <ShortAnswer gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, SHORT_ANSWER.length)}/>}

      {/* Maths */}
      {screen === 'maths' && <MathsSection gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, 10)}/>}

      {/* 11+ Prep */}
      {screen === 'prep' && <Quiz title="11+ Prep" icon="🎓" questions={PREP_QUESTIONS} gems={gems} onHome={goHome}
        onDone={score => finishActivity(score, PREP_QUESTIONS.length)}/>}

      {/* Result */}
      {screen === 'result' && lastResult && <Result score={lastResult.score} total={lastResult.total} onHome={goHome}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
